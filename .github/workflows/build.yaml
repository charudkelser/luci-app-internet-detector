name: Build OpenWrt Package

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Package
        run: |
          # Ini adalah perintah sederhana untuk meniru proses build
          # Biasanya memerlukan OpenWrt Buildroot, tapi untuk paket sederhana
          # Akang bisa menggunakan tar untuk membungkusnya menjadi .ipk
          tar -cvzf data.tar.gz -C internet-detector-mod-whatsapp/data .
          tar -cvzf control.tar.gz -C internet-detector-mod-whatsapp/luci .
          echo "1.0" > debian-binary
          ar rv internet-detector-mod-whatsapp_1.0.0_all.ipk debian-binary control.tar.gz data.tar.gz
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: package
          path: internet-detector-mod-whatsapp_1.0.0_all.ipk
