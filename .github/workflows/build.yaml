name: Build IPK

on:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build IPK
        run: |
          # Buat direktori kerja
          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/lib/lua/internet-detector/modules/
          
          # Salin file modul
          cp internet-detector-mod-whatsapp/data/usr/lib/lua/internet-detector/modules/mod_whatsapp.lua ipk/usr/lib/lua/internet-detector/modules/
          
          # Buat file control yang benar
          cat <<EOF > ipk/CONTROL/control
          Package: internet-detector-mod-whatsapp
          Version: 1.0.0
          Section: net
          Architecture: all
          Maintainer: Akang
          Description: Modul WhatsApp untuk Internet Detector
          EOF
          
          # Membuat file .ipk dengan format yang benar (tar)
          cd ipk && tar -czvf ../internet-detector-mod-whatsapp_1.0.0_all.ipk .
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: internet-detector-mod-whatsapp
          path: internet-detector-mod-whatsapp_1.0.0_all.ipk
