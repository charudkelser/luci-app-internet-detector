name: Build IPK

on:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build IPK
        run: |
          # Membuat direktori kerja
          mkdir -p package/usr/lib/lua/internet-detector/modules
          
          # Menyalin file modul ke struktur yang benar
          # Pastikan path ini sesuai dengan posisi file di repo Akang
          cp internet-detector-mod-whatsapp/data/usr/lib/lua/internet-detector/modules/mod_whatsapp.lua package/usr/lib/lua/internet-detector/modules/

          # (Di sini nanti Akang bisa tambahkan perintah tar/ar untuk membuat .ipk)
          echo "Build simulasi selesai."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-package
          path: package/
