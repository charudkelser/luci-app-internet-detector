name: Build IPK

on:
  push:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build IPK
        run: |
          # 1. Buat struktur folder paket
          mkdir -p package/usr/lib/lua/internet-detector/modules/
          
          # 2. Salin file modul ke folder paket
          cp internet-detector-mod-whatsapp/data/usr/lib/lua/internet-detector/modules/mod_whatsapp.lua package/usr/lib/lua/internet-detector/modules/
          
          # 3. Buat file control (wajib ada untuk .ipk)
          mkdir -p package/CONTROL
          cat <<EOF > package/CONTROL/control
          Package: internet-detector-mod-whatsapp
          Version: 1.0.0
          Section: net
          Architecture: all
          Maintainer: Akang
          Description: Modul WhatsApp untuk Internet Detector
          EOF
          
          # 4. Bungkus menjadi file .ipk menggunakan tar
          cd package && tar -czvf ../internet-detector-mod-whatsapp_1.0.0_all.ipk .

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: internet-detector-mod-whatsapp
          path: internet-detector-mod-whatsapp_1.0.0_all.ipk
